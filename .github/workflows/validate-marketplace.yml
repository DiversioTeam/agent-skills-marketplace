name: Validate Marketplace

on:
  pull_request:
    paths:
      - ".claude-plugin/**"
      - "plugins/**"
      - "pi-packages/**"
      - "scripts/**"
      - ".github/workflows/validate-marketplace.yml"
      - "package.json"
      - "package-lock.json"
      - ".npmrc"
  push:
    branches: [main]
    paths:
      - ".claude-plugin/**"
      - "plugins/**"
      - "pi-packages/**"
      - "scripts/**"
      - ".github/workflows/validate-marketplace.yml"
      - "package.json"
      - "package-lock.json"
      - ".npmrc"

permissions:
  contents: read
  packages: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure authenticated git fetches for validation scripts
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          AUTH_HEADER="$(printf 'x-access-token:%s' "${GITHUB_TOKEN}" | base64 | tr -d '\n')"
          git config --local "http.${GITHUB_SERVER_URL}/.extraheader" "AUTHORIZATION: basic ${AUTH_HEADER}"

      - name: Validate JSON and plugin consistency
        shell: bash
        run: |
          set -euo pipefail

          echo "Validating marketplace.json is valid JSON..."
          jq -e . .claude-plugin/marketplace.json >/dev/null

          echo "Validating plugin list has unique names..."
          DUPLICATE_NAMES="$(jq -r '.plugins[].name' .claude-plugin/marketplace.json | sort | uniq -d || true)"
          if [[ -n "${DUPLICATE_NAMES}" ]]; then
            echo "Duplicate plugin names in .claude-plugin/marketplace.json:"
            echo "${DUPLICATE_NAMES}"
            exit 1
          fi

          MARKETPLACE_PLUGINS="$(jq -r '.plugins[].name' .claude-plugin/marketplace.json | sort -u)"
          PLUGIN_DIRS="$(ls -1 plugins | sort -u)"

          echo "Validating marketplace entries match plugin directories..."
          EXTRA_DIRS="$(comm -23 <(echo "${PLUGIN_DIRS}") <(echo "${MARKETPLACE_PLUGINS}") || true)"
          if [[ -n "${EXTRA_DIRS}" ]]; then
            echo "Plugin directories missing from .claude-plugin/marketplace.json:"
            echo "${EXTRA_DIRS}"
            exit 1
          fi

          echo "Validating each marketplace plugin entry..."
          for NAME in ${MARKETPLACE_PLUGINS}; do
            if [[ ! -d "plugins/${NAME}" ]]; then
              echo "Missing plugin directory: plugins/${NAME}"
              exit 1
            fi

            SOURCE="$(jq -r --arg name "${NAME}" '.plugins[] | select(.name == $name) | .source' .claude-plugin/marketplace.json)"
            if [[ "${SOURCE}" != "./plugins/${NAME}" ]]; then
              echo "Marketplace source mismatch for ${NAME}: expected ./plugins/${NAME}, got ${SOURCE}"
              exit 1
            fi

            PLUGIN_JSON="plugins/${NAME}/.claude-plugin/plugin.json"
            if [[ ! -f "${PLUGIN_JSON}" ]]; then
              echo "Missing plugin manifest: ${PLUGIN_JSON}"
              exit 1
            fi

            jq -e . "${PLUGIN_JSON}" >/dev/null

            PLUGIN_NAME="$(jq -r '.name' "${PLUGIN_JSON}")"
            if [[ "${PLUGIN_NAME}" != "${NAME}" ]]; then
              echo "plugin.json name mismatch for ${NAME}: got ${PLUGIN_NAME}"
              exit 1
            fi

            PLUGIN_VERSION="$(jq -r '.version' "${PLUGIN_JSON}")"
            MARKETPLACE_VERSION="$(jq -r --arg name "${NAME}" '.plugins[] | select(.name == $name) | .version' .claude-plugin/marketplace.json)"
            if [[ "${PLUGIN_VERSION}" != "${MARKETPLACE_VERSION}" ]]; then
              echo "Version mismatch for ${NAME}: plugin.json=${PLUGIN_VERSION} marketplace=${MARKETPLACE_VERSION}"
              exit 1
            fi

            SKILL_COUNT="$(find "plugins/${NAME}/skills" -type f -name 'SKILL.md' | wc -l | tr -d ' ')"
            if [[ "${SKILL_COUNT}" -eq 0 ]]; then
              echo "No SKILL.md found under plugins/${NAME}/skills"
              exit 1
            fi
          done

          echo "All marketplace validation checks passed."

      - name: Validate Pi package manifests
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -d pi-packages ]]; then
            echo "No pi-packages directory found."
            exit 0
          fi

          for PACKAGE_DIR in pi-packages/*; do
            [[ -d "${PACKAGE_DIR}" ]] || continue
            PACKAGE_JSON="${PACKAGE_DIR}/package.json"
            if [[ ! -f "${PACKAGE_JSON}" ]]; then
              echo "::error file=${PACKAGE_DIR}::Missing package.json for Pi package."
              exit 1
            fi

            jq -e . "${PACKAGE_JSON}" >/dev/null
            NAME="$(jq -r '.name // empty' "${PACKAGE_JSON}")"
            VERSION="$(jq -r '.version // empty' "${PACKAGE_JSON}")"
            if [[ -z "${NAME}" || -z "${VERSION}" ]]; then
              echo "::error file=${PACKAGE_JSON}::Pi package package.json must include name and version."
              exit 1
            fi
            if [[ "${NAME}" != "$(basename "${PACKAGE_DIR}")" ]]; then
              echo "::error file=${PACKAGE_JSON}::Pi package name must match directory name."
              exit 1
            fi
          done

      - name: Install root package dependencies for Pi package discovery
        shell: bash
        env:
          NPM_TOKEN: ${{ github.token }}
          NODE_AUTH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          npm install --package-lock=false

      - name: Install Pi CLI for package discovery
        shell: bash
        run: |
          set -euo pipefail
          npm install --global @mariozechner/pi-coding-agent@0.70.6
          pi --version

      - name: Validate Pi package command discovery and npm packs
        shell: bash
        run: |
          set -euo pipefail

          for PACKAGE_DIR in pi-packages/*; do
            [[ -d "${PACKAGE_DIR}" ]] || continue
            NAME="$(jq -r '.name' "${PACKAGE_DIR}/package.json")"
            echo "Validating Pi package ${NAME}..."
            (cd "${PACKAGE_DIR}" && npm pack --dry-run --json >/tmp/${NAME}-pack.json)

            if [[ -d "${PACKAGE_DIR}/extensions" ]]; then
              printf '{"id":"cmds","type":"get_commands"}\n' | \
                PI_OFFLINE=1 pi --mode rpc --no-session --no-context-files \
                  --no-extensions -e "./${PACKAGE_DIR}" \
                  --no-prompt-templates --no-skills >/tmp/${NAME}-commands.json
              jq -e '.success == true' "/tmp/${NAME}-commands.json" >/dev/null
            fi
          done

      - name: Validate SKILL.md size budgets
        shell: bash
        env:
          GITHUB_BEFORE: ${{ github.event.before }}
        run: |
          bash scripts/validate-skills.sh
